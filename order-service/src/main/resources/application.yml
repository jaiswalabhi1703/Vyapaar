server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      # The outbox relay publishes pre-serialized JSON strings and sets the type header itself.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Saga tuning
saga:
  # Payment is now a user-in-the-loop PayU redirect, so the payment step can legitimately take
  # minutes while the customer completes checkout. Keep this comfortably above a human payment time.
  step-timeout: ${SAGA_STEP_TIMEOUT:10m}   # a step with no reply within this window is force-compensated
  timeout-scan-interval-ms: 5000
outbox:
  poll-interval-ms: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
